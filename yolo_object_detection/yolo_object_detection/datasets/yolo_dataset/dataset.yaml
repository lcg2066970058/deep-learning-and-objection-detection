# 数据集根目录（和config.py里的DATA_DIR完全匹配）
path: ./datasets/yolo_dataset

# 训练/验证/测试集路径（相对path的子路径，开头绝对不能加/！！！）
train: images/train
val: images/val
# 若无test目录，直接注释/删除这行，避免额外校验报错
test: images/test

# 类别数量和名称（保持你的原有配置，和config.py逻辑一致）
nc: 10
names: ['airplane', 'apple', 'car', 'cat', 'cup', 'dog', 'human', 'motorcycle', 'umbrella', 'watermelon']